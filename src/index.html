<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Commander</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>
<div class="panes-container">
    <div class="pane" id="pane-left">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="triggerUpload('left')">📤</button>
            <button class="toolbar-btn" onclick="doCreateFolder('left')">📁+</button>
            <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
            <button class="toolbar-btn needs-sel" onclick="doCopy('left')">📋</button>
            <button class="toolbar-btn needs-sel" onclick="doMove('left')">🚚</button>
            <button class="toolbar-btn needs-sel btn-rename" onclick="doRename('left')">✏️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('left')">🗑️</button>
            <input type="file" id="file-input-left" style="display:none" onchange="handleUpload('left', this)">
        </div>
        <div class="path-bar" id="path-left">/</div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead><tr><th>Имя</th><th>Владелец</th><th>Права</th><th>Дата</th></tr></thead>
                <tbody id="list-left"></tbody>
            </table>
        </div>
    </div>

    <div class="pane" id="pane-right">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="triggerUpload('right')">📤</button>
            <button class="toolbar-btn" onclick="doCreateFolder('right')">📁+</button>
            <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
            <button class="toolbar-btn needs-sel" onclick="doCopy('right')">📋</button>
            <button class="toolbar-btn needs-sel" onclick="doMove('right')">🚚</button>
            <button class="toolbar-btn needs-sel btn-rename" onclick="doRename('right')">✏️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('right')">🗑️</button>
            <input type="file" id="file-input-right" style="display:none" onchange="handleUpload('right', this)">
        </div>
        <div class="path-bar" id="path-right">/</div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead><tr><th>Имя</th><th>Владелец</th><th>Права</th><th>Дата</th></tr></thead>
                <tbody id="list-right"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
