<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Cloud Commander</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>
<div id="tasks-container" class="tasks-container"></div>

<div class="panes-container">
    <div class="pane" id="pane-left">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="refreshPane('left')" title="Обновить">🔄</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="triggerUpload('left')" title="Загрузить">📤</button>
            <button class="toolbar-btn" onclick="doCreateObj('left', 'folder')" title="Новая папка">📁+</button>
            <button class="toolbar-btn" onclick="doCreateObj('left', 'file')" title="Новый файл">📄+</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('left', 'copy')" title="Копировать" disabled>📄+</button>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('left', 'cut')" title="Вырезать" disabled>✂️</button>
            <button class="toolbar-btn btn-paste" onclick="doPaste('left')" title="Вставить" disabled>📋</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-one" onclick="doRename('left')" title="Имя" disabled>✏️</button>
            <button class="toolbar-btn needs-one" onclick="openPerms('left')" title="Права" disabled>🛡️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('left')" title="Удалить" disabled>🗑️</button>
            <input type="file" id="file-input-left" style="display:none" onchange="handleUpload('left', this)">
        </div>
        <div class="path-bar" id="path-left">/</div>
        <div class="file-table-wrapper"><table class="file-table"><thead><tr><th>Имя</th><th>Владелец</th><th>Права</th><th>Дата</th></tr></thead><tbody id="list-left"></tbody></table></div>
    </div>
    
    <div class="pane" id="pane-right">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="refreshPane('right')" title="Обновить">🔄</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="triggerUpload('right')" title="Загрузить">📤</button>
            <button class="toolbar-btn" onclick="doCreateObj('right', 'folder')" title="Новая папка">📁+</button>
            <button class="toolbar-btn" onclick="doCreateObj('right', 'file')" title="Новый файл">📄+</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('right', 'copy')" title="Копировать" disabled>📄+</button>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('right', 'cut')" title="Вырезать" disabled>✂️</button>
            <button class="toolbar-btn btn-paste" onclick="doPaste('right')" title="Вставить" disabled>📋</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-one" onclick="doRename('right')" title="Имя" disabled>✏️</button>
            <button class="toolbar-btn needs-one" onclick="openPerms('right')" title="Права" disabled>🛡️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('right')" title="Удалить" disabled>🗑️</button>
            <input type="file" id="file-input-right" style="display:none" onchange="handleUpload('right', this)">
        </div>
        <div class="path-bar" id="path-right">/</div>
        <div class="file-table-wrapper"><table class="file-table"><thead><tr><th>Имя</th><th>Владелец</th><th>Права</th><th>Дата</th></tr></thead><tbody id="list-right"></tbody></table></div>
    </div>
</div>

<div id="editorModal" class="modal-overlay">
    <div class="modal large">
        <h3>📄 Редактор: <span id="editorTitle"></span></h3>
        <textarea id="editorContent" class="editor-area" spellcheck="false"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal('editorModal')">Отмена</button>
            <button onclick="saveFile()" style="background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer">Сохранить</button>
        </div>
    </div>
</div>

<div id="permsModal" class="modal-overlay">
    <div class="modal">
        <h3>🛡️ Права доступа</h3>
        <div class="perms-grid" onclick="updateOctal()">
            <span></span><b>R</b><b>W</b><b>X</b>
            <span>Владелец</span><input type="checkbox" id="p-u-r"><input type="checkbox" id="p-u-w"><input type="checkbox" id="p-u-x">
            <span>Группа</span><input type="checkbox" id="p-g-r"><input type="checkbox" id="p-g-w"><input type="checkbox" id="p-g-x">
            <span>Прочие</span><input type="checkbox" id="p-o-r"><input type="checkbox" id="p-o-w"><input type="checkbox" id="p-o-x">
        </div>
        <div style="text-align:center; font-size:13px; margin-bottom:10px;">Маска: <b id="permsOctal">0644</b></div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeModal('permsModal')">Отмена</button>
            <button onclick="savePerms()" style="background:var(--accent); color:#fff; border:none; padding:5px 15px; border-radius:4px; cursor:pointer">ОК</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
