<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple File Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>

<div id="tasks-widget" class="tasks-widget">
    <div class="tasks-header" onclick="toggleTasks()">
        <span>🔄 Фоновые операции (<span id="task-count">0</span>)</span>
        <div style="display:flex; align-items:center; gap:8px;">
            <button id="btn-clear-tasks" onclick="clearCompletedTasks(event)" style="display:none; background:var(--pane-bg); color:var(--text-color); border:1px solid var(--border-color); border-radius:4px; padding:2px 8px; font-size:12px; cursor:pointer;" title="Очистить завершенные">Очистить</button>
            <span id="task-chevron">▼</span>
        </div>
    </div>
    <div id="tasks-container" class="tasks-container"></div>
</div>

<div class="panes-container">
    <div class="pane" id="pane-left">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="refreshPane('left')" title="Обновить">🔄</button>
            <button class="toolbar-btn btn-trash" onclick="gotoTrash('left')" title="Корзина" style="display:none">🗑️</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="triggerUpload('left')" title="Загрузить">📥</button>
            <button class="toolbar-btn needs-one" onclick="doDownload('left')" title="Скачать" disabled>📤</button>
            <button class="toolbar-btn" onclick="doCreateObj('left', 'folder')" title="Новая папка">📁+</button>
            <button class="toolbar-btn" onclick="doCreateObj('left', 'file')" title="Новый файл">📄+</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('left', 'copy')" title="Копировать" disabled>📄+</button>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('left', 'cut')" title="Вырезать" disabled>✂️</button>
            <button class="toolbar-btn btn-paste" onclick="doPaste('left')" title="Вставить" disabled>📋</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-one" onclick="doShowInfo('left')" title="Свойства" disabled>ℹ️</button>
            
            <!-- Выпадающее меню: Инструменты -->
            <div class="toolbar-sep tool-menu-container" style="display:none;"></div>
            <div class="dropdown tool-menu-container" style="display:none;">
                <button class="toolbar-btn dropdown-btn needs-one" disabled title="Инструменты">🛠️ ▼</button>
                <div class="dropdown-content">
                    <button class="dropdown-item tool-ffprobe" onclick="doFfprobe('left')" style="display:none;">🎬 Медиа инфо (ffprobe)</button>
                </div>
            </div>
            
            <button class="toolbar-btn needs-one" onclick="doRename('left')" title="Имя" disabled>✏️</button>
            <button class="toolbar-btn needs-one" onclick="openPerms('left')" title="Права" disabled>🛡️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('left')" title="Удалить" disabled>❌</button>
            <input type="file" id="file-input-left" style="display:none" onchange="handleUpload('left', this)">
        </div>
        <div class="path-bar" id="path-left"></div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead>
                    <tr>
                        <th onclick="changeSort('left', 'name')" style="cursor:pointer; user-select:none;" title="Сортировка по имени">Имя <span id="sort-left-name"></span></th>
                        <th>Тип</th>
                        <th>Размер</th>
                        <th>Владелец</th>
                        <th>Права</th>
                        <th onclick="changeSort('left', 'date')" style="cursor:pointer; user-select:none;" title="Сортировка по дате">Дата <span id="sort-left-date"></span></th>
                    </tr>
                </thead>
                <tbody id="list-left"></tbody>
            </table>
        </div>
    </div>
    
    <div class="resizer" id="resizer" title="Потяните для изменения размера"></div>
    
    <div class="pane" id="pane-right">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="refreshPane('right')" title="Обновить">🔄</button>
            <button class="toolbar-btn btn-trash" onclick="gotoTrash('right')" title="Корзина" style="display:none">🗑️</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" onclick="triggerUpload('right')" title="Загрузить">📥</button>
            <button class="toolbar-btn needs-one" onclick="doDownload('right')" title="Скачать" disabled>📤</button>
            <button class="toolbar-btn" onclick="doCreateObj('right', 'folder')" title="Новая папка">📁+</button>
            <button class="toolbar-btn" onclick="doCreateObj('right', 'file')" title="Новый файл">📄+</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('right', 'copy')" title="Копировать" disabled>📄+</button>
            <button class="toolbar-btn needs-sel" onclick="addToClipboard('right', 'cut')" title="Вырезать" disabled>✂️</button>
            <button class="toolbar-btn btn-paste" onclick="doPaste('right')" title="Вставить" disabled>📋</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn needs-one" onclick="doShowInfo('right')" title="Свойства" disabled>ℹ️</button>
            
            <!-- Выпадающее меню: Инструменты -->
            <div class="toolbar-sep tool-menu-container" style="display:none;"></div>
            <div class="dropdown tool-menu-container" style="display:none;">
                <button class="toolbar-btn dropdown-btn needs-one" disabled title="Инструменты">🛠️ ▼</button>
                <div class="dropdown-content">
                    <button class="dropdown-item tool-ffprobe" onclick="doFfprobe('right')" style="display:none;">🎬 Медиа инфо (ffprobe)</button>
                </div>
            </div>
            
            <button class="toolbar-btn needs-one" onclick="doRename('right')" title="Имя" disabled>✏️</button>
            <button class="toolbar-btn needs-one" onclick="openPerms('right')" title="Права" disabled>🛡️</button>
            <button class="toolbar-btn needs-sel" onclick="doDelete('right')" title="Удалить" disabled>❌</button>
            <input type="file" id="file-input-right" style="display:none" onchange="handleUpload('right', this)">
        </div>
        <div class="path-bar" id="path-right"></div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead>
                    <tr>
                        <th onclick="changeSort('right', 'name')" style="cursor:pointer; user-select:none;" title="Сортировка по имени">Имя <span id="sort-right-name"></span></th>
                        <th>Тип</th>
                        <th>Размер</th>
                        <th>Владелец</th>
                        <th>Права</th>
                        <th onclick="changeSort('right', 'date')" style="cursor:pointer; user-select:none;" title="Сортировка по дате">Дата <span id="sort-right-date"></span></th>
                    </tr>
                </thead>
                <tbody id="list-right"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal">
        <h3>🗑️ Удаление файлов</h3>
        <p style="margin-top: 10px; font-size: 14px;">Выбранные файлы можно безопасно переместить в корзину или удалить безвозвратно.</p>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button onclick="closeModal('deleteModal')">Отмена</button>
            <button onclick="executeDelete('permanent')" style="background:#dc3545; color:#fff; border:none; padding:8px 15px; border-radius:4px; cursor:pointer" title="Не подлежит восстановлению">Навсегда</button>
            <button onclick="executeDelete('trash')" style="background:var(--accent); color:#fff; border:none; padding:8px 15px; border-radius:4px; cursor:pointer">В корзину</button>
        </div>
    </div>
</div>

<div id="editorModal" class="modal-overlay">
    <div class="modal large">
        <h3>📄 Редактор: <span id="editorTitle"></span></h3>
        <textarea id="editorContent" class="editor-area" spellcheck="false"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal('editorModal')">Отмена</button>
            <button onclick="saveFile()" style="background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer">Сохранить</button>
        </div>
    </div>
</div>

<div id="permsModal" class="modal-overlay">
    <div class="modal">
        <h3>🛡️ Права доступа</h3>
        <div class="perms-grid" onclick="updateOctal()">
            <span></span><b>R</b><b>W</b><b>X</b>
            <span>Владелец</span><input type="checkbox" id="p-u-r"><input type="checkbox" id="p-u-w"><input type="checkbox" id="p-u-x">
            <span>Группа</span><input type="checkbox" id="p-g-r"><input type="checkbox" id="p-g-w"><input type="checkbox" id="p-g-x">
            <span>Прочие</span><input type="checkbox" id="p-o-r"><input type="checkbox" id="p-o-w"><input type="checkbox" id="p-o-x">
        </div>
        <div style="text-align:center; font-size:13px; margin-bottom:10px;">Маска: <b id="permsOctal">0644</b></div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeModal('permsModal')">Отмена</button>
            <button onclick="savePerms()" style="background:var(--accent); color:#fff; border:none; padding:5px 15px; border-radius:4px; cursor:pointer">ОК</button>
        </div>
    </div>
</div>

<div id="infoModal" class="modal-overlay">
    <div class="modal">
        <h3 style="display:flex; justify-content:space-between; align-items:center;">
            <span>ℹ️ Свойства: <span id="infoTitle" style="color:var(--accent);"></span></span>
            <button onclick="closeModal('infoModal')" style="background:none; border:none; color:var(--text-color); padding:0; font-size:16px; cursor:pointer;">✖</button>
        </h3>
        <div id="infoContent" style="font-size: 13px; margin-top: 15px; line-height: 1.6;"></div>
        <div style="display:flex; justify-content:flex-end; margin-top:20px;">
            <button onclick="closeModal('infoModal')" style="background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer">Закрыть</button>
        </div>
    </div>
</div>

<div id="ffprobeModal" class="modal-overlay">
    <div class="modal" style="width: 500px; max-height: 80vh; display:flex; flex-direction:column;">
        <h3 style="display:flex; justify-content:space-between; align-items:center;">
            <span>🎬 Медиа инфо: <span id="ffprobeTitle" style="color:var(--accent);"></span></span>
            <button onclick="closeModal('ffprobeModal')" style="background:none; border:none; color:var(--text-color); padding:0; font-size:16px; cursor:pointer;">✖</button>
        </h3>
        <div id="ffprobeContent" style="font-size: 13px; margin-top: 15px; flex-grow: 1; overflow-y: auto;"></div>
        <div style="display:flex; justify-content:flex-end; margin-top:20px;">
            <button onclick="closeModal('ffprobeModal')" style="background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer">Закрыть</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
