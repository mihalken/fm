<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panes-container">
    <div class="pane" id="pane-left">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="triggerUpload('left')" title="Загрузить файл">📤</button>
            <button class="toolbar-btn" onclick="createFolder('left')" title="Создать папку">📁+</button>
            <input type="file" id="file-input-left" style="display:none" onchange="handleUpload('left', this)">
            <div class="path-bar" id="path-left">/</div>
        </div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead><tr><th>Имя</th><th>Владелец:Группа</th><th>Права</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody id="list-left"></tbody>
            </table>
        </div>
    </div>

    <div class="pane" id="pane-right">
        <div class="toolbar">
            <button class="toolbar-btn" onclick="triggerUpload('right')" title="Загрузить файл">📤</button>
            <button class="toolbar-btn" onclick="createFolder('right')" title="Создать папку">📁+</button>
            <input type="file" id="file-input-right" style="display:none" onchange="handleUpload('right', this)">
            <div class="path-bar" id="path-right">/</div>
        </div>
        <div class="file-table-wrapper">
            <table class="file-table">
                <thead><tr><th>Имя</th><th>Владелец:Группа</th><th>Права</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody id="list-right"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
